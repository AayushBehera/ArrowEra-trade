services:
  api:
    environment:
      ENVIRONMENT: development
    volumes:
      - ../../services:/app/services
    command: ["python", "-m", "uvicorn", "services.api.app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
  web:
    build:
      target: build
    command: ["npm", "run", "dev", "--workspace=@arrowera/web"]
    volumes:
      - ../../apps/web:/app/apps/web
