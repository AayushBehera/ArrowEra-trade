apiVersion: apps/v1
kind: Deployment
metadata:
  name: arrowera-api
  namespace: arrowera
  labels:
    app: arrowera-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: arrowera-api
  template:
    metadata:
      labels:
        app: arrowera-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: arrowera/api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: arrowera-config
            - secretRef:
                name: arrowera-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
