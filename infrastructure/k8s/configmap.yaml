apiVersion: v1
kind: ConfigMap
metadata:
  name: arrowera-config
  namespace: arrowera
data:
  APP_NAME: "ArrowEra Trade API"
  ENVIRONMENT: "production"
  DATABASE_URL: "postgresql+asyncpg://arrowera:changeme@postgres:5432/arrowera"
  CORS_ORIGINS: "https://trade.arrowera.com"
  ALLOWED_HOSTS: "api.arrowera.com,trade.arrowera.com"
  RATE_LIMIT_PER_MINUTE: "120"
  LLM_PROVIDER_ORDER: "openai,anthropic,gemini"
  OPENAI_MODEL: "gpt-4.1-mini"
  ANTHROPIC_MODEL: "claude-3-5-sonnet-latest"
  GEMINI_MODEL: "gemini-2.0-flash"
