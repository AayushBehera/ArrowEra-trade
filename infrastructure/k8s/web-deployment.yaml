apiVersion: apps/v1
kind: Deployment
metadata:
  name: arrowera-web
  namespace: arrowera
  labels:
    app: arrowera-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: arrowera-web
  template:
    metadata:
      labels:
        app: arrowera-web
    spec:
      containers:
        - name: web
          image: arrowera/web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.arrowera.com"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: arrowera-web
  namespace: arrowera
spec:
  selector:
    app: arrowera-web
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
